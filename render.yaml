services:
  - type: web
    name: gym-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: gym-db
      mountPath: /data
      sizeGB: 1
